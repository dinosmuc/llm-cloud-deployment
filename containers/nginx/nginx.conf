# Two-tier authentication:
#   1) Client sends `x-api-key: <user_key>`. nginx validates it against ${API_KEY}
#      via a constant-time map lookup.
#   2) On a valid client key, nginx injects `Authorization: Bearer ${VLLM_API_KEY}`
#      upstream, satisfying vLLM's --api-key check.
#
# Both ${API_KEY} and ${VLLM_API_KEY} are substituted by envsubst at container
# start (see Dockerfile CMD); by the time nginx reads this file, the placeholders
# are gone and only the real values are present in /etc/nginx/nginx.conf.
#
# /health is intentionally open so the ALB target-group probe and the frontend
# cold-start poller can reach it without credentials. /v1/chat/completions is
# the only authenticated route and is the only path vLLM ever sees traffic on.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    keepalive_timeout 300;   # aligned with ALB idle_timeout so SSE streams aren't cut

    # ---- API-key lookup ----
    # Any header value that does NOT equal ${API_KEY} stays "0"; only the exact
    # match flips to "1". Comparison is constant-time via nginx's map hash.
    map $http_x_api_key $api_key_match {
        default      0;
        "${API_KEY}" 1;
    }

    server {
        listen 80;

        # ---- Health probe (no auth) ----
        location /health {
            proxy_pass http://127.0.0.1:8000/health;
            proxy_set_header Host $host;
        }

        # ---- Inference: OpenAI-compatible chat completions on vLLM ----
        location /v1/chat/completions {
            # Reject missing / wrong client key before doing any upstream work
            if ($http_x_api_key = "") {
                return 401 '{"error": "Missing API key. Include x-api-key header."}';
            }
            if ($api_key_match = 0) {
                return 401 '{"error": "Invalid API key."}';
            }

            proxy_pass http://127.0.0.1:8000/v1/chat/completions;

            # Internal bearer token for vLLM's --api-key check.
            # ${VLLM_API_KEY} is replaced by envsubst at container start.
            proxy_set_header Authorization "Bearer ${VLLM_API_KEY}";

            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_set_header Connection '';
            proxy_http_version 1.1;

            # SSE streaming hygiene — same values as the ALB and vLLM expect:
            #   proxy_buffering off       : forward chunks immediately
            #   proxy_cache off           : never cache inference output
            #   chunked_transfer_encoding : preserve HTTP/1.1 chunked framing
            #   proxy_read_timeout 300s   : matches keepalive_timeout + ALB idle
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 300s;
        }

        # Everything else is closed.
        location / {
            return 404 '{"error": "Not found"}';
        }
    }
}
